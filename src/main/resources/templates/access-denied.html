<!-- src/main/resources/templates/access-denied.html -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>ACCESS DENIED</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a1f;
      color: #ff3366;
      font-family: 'IBM Plex Mono', monospace;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      text-align: center;
      padding: 20px;
    }
    .container {
      background: rgba(15, 15, 42, 0.95);
      border: 3px solid #ff3366;
      border-radius: 8px;
      padding: 40px;
      max-width: 500px;
      box-shadow: 0 0 30px rgba(255, 51, 102, 0.5);
    }
    .header {
      font-family: 'Orbitron', sans-serif;
      font-size: 36px;
      letter-spacing: 6px;
      text-transform: uppercase;
      color: #ff0066;
      text-shadow: 0 0 15px #ff0066;
      margin-bottom: 20px;
    }
    .message {
      font-size: 18px;
      margin: 20px 0;
      color: #ff6699;
    }
    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 30px;
      background: transparent;
      border: 2px solid #ff3366;
      color: #ff6699;
      text-decoration: none;
      text-transform: uppercase;
      letter-spacing: 2px;
      border-radius: 4px;
      transition: all 0.3s;
    }
    .btn:hover {
      background: #ff3366;
      color: #000;
      box-shadow: 0 0 20px rgba(255, 51, 102, 0.8);
    }
  </style>
</head>
<body>
<div class="container">
  <div class="header">ACCESS DENIED</div>
  <div class="message">You do not have permission to access this system.</div>
  <a href="/login" class="btn">RETURN TO LOGIN</a>
</div>
</body>
</html>
