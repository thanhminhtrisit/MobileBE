        <!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>MAINFRAME ACCESS v3.1</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        :root {
            --crt-green: #00ff00;
            --glow: #00ff41;
            --dark: #000;
            --log-bg: #001100;
            --warn: #ffaa00;
            --success: #55ff55;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background:var(--dark); color:var(--crt-green); font-family:'VT323',monospace;
            font-size:20px; display:flex; justify-content:center; align-items:center;
            min-height:100vh; overflow:hidden; position:relative; padding:20px;
        }
        body::before {
            content:''; position:fixed; top:0; left:0; right:0; bottom:0;
            background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.08) 2px,rgba(0,0,0,0.08) 4px);
            pointer-events:none; z-index:10; animation:flicker 3s infinite;
        }
        @keyframes flicker { 0%,100%{opacity:1} 50%{opacity:0.97} }
        .glow { text-shadow:0 0 5px var(--glow),0 0 10px var(--glow); }

        /* LAYOUT 3 BẢNG */
        .mainframe {
            display:grid; grid-template-columns: 1fr 1.3fr 1fr; gap:18px;
            width:100%; max-width:1400px; height:80vh;
        }

        /* BẢNG 1: CONTROL PANEL */
        .panel {
            background:var(--dark); border:8px double var(--crt-green);
            padding:20px; display:flex; flex-direction:column; justify-content:center;
            align-items:center; box-shadow:0 0 25px rgba(0,255,0,0.4);
            position:relative; text-align:center;
        }
        .panel-title {
            position:absolute; top:-14px; left:50%; transform:translateX(-50%);
            background:var(--dark); padding:0 12px; font-size:18px; letter-spacing:3px;
            color:#00cc00;
        }
        .status-msg {
            font-size:18px; margin:20px 0; text-align:center;
            min-height:60px; display:flex; align-items:center; justify-content:center;
        }
        .waiting { color:var(--warn); animation:pulse 2s infinite; }
        .auth-active { color:var(--success); animation:blink 1s steps(2) infinite; }
        @keyframes pulse { 0%,100%{opacity:0.6} 50%{opacity:1} }
        @keyframes blink { 50% { opacity:0; } }

        /* BẢNG 2: TERMINAL */
        .terminal {
            background:var(--dark); border:8px double var(--crt-green);
            padding:20px; display:flex; flex-direction:column;
            box-shadow:0 0 25px rgba(0,255,0,0.4);
        }
        .term-output {
            flex:1; overflow-y:auto; margin-bottom:12px; line-height:1.5;
            padding-right:8px; word-break:break-all;
        }
        .term-output::-webkit-scrollbar { width:10px; }
        .term-output::-webkit-scrollbar-track { background:#000; border:1px solid #003300; }
        .term-output::-webkit-scrollbar-thumb {
            background:#004400; border:2px solid var(--crt-green); border-radius:2px;
        }
        .prompt-line {
            display:flex; align-items:center;
        }
        .prompt-line::before {
            content:">"; margin-right:8px; color:var(--crt-green); animation:blink 1s steps(2) infinite;
        }
        .input {
            background:transparent; border:none; color:var(--crt-green); font-family:inherit;
            font-size:inherit; outline:none; flex:1; caret-color:var(--crt-green);
        }
        .cursor {
            display:inline-block; width:11px; height:24px; background:var(--crt-green);
            margin-left:2px; animation:blink 0.9s steps(2) infinite;
        }

        /* BẢNG 3: SYSTEM LOG - ĐÃ FIX TRÀN + SCROLL MƯỢT */
        .log {
            background:var(--log-bg); border:8px double var(--crt-green);
            padding:20px; display:flex; flex-direction:column;
            box-shadow:0 0 25px rgba(0,255,0,0.3), inset 0 0 30px rgba(0,50,0,0.7);
            position:relative;
        }
        .log-header {
            position:absolute; top:-14px; left:50%; transform:translateX(-50%);
            background:var(--log-bg); padding:0 12px; font-size:18px; letter-spacing:3px;
            color:#00cc00;
        }
        .log-content {
            flex:1; overflow-y:auto; padding-right:8px; line-height:1.5;
            word-break:break-all; font-size:18px;
        }
        .log-content::-webkit-scrollbar { width:10px; }
        .log-content::-webkit-scrollbar-track { background:#000; border:1px solid #003300; }
        .log-content::-webkit-scrollbar-thumb {
            background:#004400; border:2px solid var(--crt-green); border-radius:2px;
        }
        .log-line {
            margin:3px 0; opacity:0; animation:fadeIn 0.3s forwards;
            white-space:pre-wrap; word-wrap:break-word;
        }
        .log-line.error { color:#ff5555; }
        .log-line.success { color:var(--success); }
        .log-line.info { color:#00ff88; }
        .log-line.warn { color:var(--warn); }
        @keyframes fadeIn { to { opacity:1; } }

        /* BOOT SCREEN */
        .boot {
            position:fixed; top:0; left:0; right:0; bottom:0; background:var(--dark);
            color:var(--crt-green); font-family:'VT323',monospace; font-size:22px;
            padding:40px; z-index:100; display:flex; flex-direction:column;
        }
        .boot-line { margin:5px 0; opacity:0; }
    </style>
</head>
<body>

<!-- BOOT SCREEN -->
<div class="boot" id="bootScreen">
    <div class="boot-line" data-text="LABRYNTH OS v3.1.87"></div>
    <div class="boot-line" data-text="COPYRIGHT © 1987 X-CORP INDUSTRIES"></div>
    <div class="boot-line" data-text="INITIALIZING SYSTEM..."></div>
    <div class="boot-line" data-text="CHECKING MEMORY... 640K OK"></div>
    <div class="boot-line" data-text="LOADING AUTH MODULE..."></div>
    <div class="boot-line" data-text="SECURE LINK ESTABLISHED"></div>
    <div class="boot-line" data-text="TYPE 'help' FOR COMMANDS"></div>
</div>

<!-- 3 BẢNG CHÍNH -->
<div class="mainframe" id="mainframe" style="display:none;">
    <!-- BẢNG 1: CONTROL PANEL -->
    <div class="panel">
        <div class="panel-title">AUTH STATUS</div>
        <div class="status-msg waiting" id="statusMsg">WAITING FOR LOGIN COMMAND</div>
    </div>

    <!-- BẢNG 2: TERMINAL -->
    <div class="terminal">
        <div class="panel-title">COMMAND TERMINAL</div>
        <div class="term-output" id="output">
            <div>Welcome to LABRYNTH Secure Terminal</div>
            <div>Type <span style="color:#00ff88;">help</span> for available commands.</div>
        </div>
        <div class="prompt-line">
            <input type="text" class="input" id="cmdInput" autocomplete="off" autofocus>
            <div class="cursor"></div>
        </div>
    </div>

    <!-- BẢNG 3: SYSTEM LOG - ĐÃ FIX SCROLL -->
    <div class="log">
        <div class="log-header">SYSTEM LOG</div>
        <div class="log-content" id="logOutput"></div>
    </div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>

<script th:inline="javascript">
    /*<![CDATA[*/
    const firebaseConfig = {
        apiKey: "AIzaSyAGC4wLk1n1r6aeVhTdTSGPaZWsP5fVHYc",
        authDomain: "labrynth-bbf88.firebaseapp.com",
        projectId: "labrynth-bbf88",
        storageBucket: "labrynth-bbf88.firebasestorage.app",
        messagingSenderId: "61094037653",
        appId: "1:61094037653:web:587f6f0624317de8f8739c"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    const bootScreen = document.getElementById('bootScreen');
    const mainframe = document.getElementById('mainframe');
    const output = document.getElementById('output');
    const logOutput = document.getElementById('logOutput');
    const input = document.getElementById('cmdInput');
    const statusMsg = document.getElementById('statusMsg');

    // === HÀM GIỜ VIỆT NAM (GMT+7) ===
    function getVietnamTime() {
        const now = new Date();
        const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
        return new Date(utc + (7 * 3600000));
    }

    function formatVNTime(date) {
        return date.toLocaleTimeString('vi-VN', {
            hour: '2-digit',
            minute: '2-digit',
            second: '2-digit',
            hour12: false
        });
    }

    // LOG SYSTEM - TỰ ĐỘNG CUỘN + KHÔNG TRÀN
    function log(msg, type = 'info') {
        const vnTime = getVietnamTime();
        const line = document.createElement('div');
        line.className = `log-line ${type}`;
        line.textContent = `[${formatVNTime(vnTime)}] ${msg}`;
        logOutput.appendChild(line);

        // TỰ ĐỘNG CUỘN XUỐNG DÒNG MỚI
        const isScrolledToBottom = logOutput.scrollHeight - logOutput.clientHeight <= logOutput.scrollTop + 10;
        logOutput.scrollTop = logOutput.scrollHeight;

        // Animation
        setTimeout(() => line.style.animation = 'fadeIn 0.3s forwards', 10);
    }

    // TERMINAL OUTPUT
    function addOutput(text) {
        const div = document.createElement('div');
        div.innerHTML = text;
        output.appendChild(div);
        output.scrollTop = output.scrollHeight;
    }

    // CONTROL PANEL STATUS
    function updateStatus(msg, className) {
        statusMsg.textContent = msg;
        statusMsg.className = `status-msg ${className}`;
    }

    // BOOT 4 GIÂY
    window.onload = () => {
        const lines = bootScreen.querySelectorAll('.boot-line');
        let i = 0;
        function next() {
            if (i < lines.length) {
                const el = lines[i];
                el.style.opacity = 1;
                let j = 0;
                const int = setInterval(() => {
                    if (j < el.getAttribute('data-text').length) {
                        el.textContent += el.getAttribute('data-text')[j++];
                    } else {
                        clearInterval(int);
                        i++;
                        setTimeout(next, 120);
                    }
                }, 35);
            } else {
                setTimeout(() => {
                    bootScreen.style.display = 'none';
                    mainframe.style.display = 'grid';
                    input.focus();
                    log('Mainframe interface loaded', 'success');
                    updateStatus('WAITING FOR LOGIN COMMAND', 'waiting');
                }, 600);
            }
        }
        next();
    };

    // LỆNH TERMINAL
    const commands = {
        help: () => {
            addOutput(`Available commands:
  <span style="color:#00ff88;">login</span>     - Initiate Google authentication
  <span style="color:#00ff88;">status</span>    - Show system status
  <span style="color:#00ff88;">clear</span>     - Clear terminal
  <span style="color:#00ff88;">whoami</span>    - Show current user
  <span style="color:#00ff88;">time</span>      - Display current time (GMT+7)
  <span style="color:#00ff88;">echo</span> [text] - Repeat input
  <span style="color:#00ff88;">reset</span>     - Reset authentication`);
            log('HELP command executed', 'info');
        },
        login: async () => {
            updateStatus('AUTHENTICATING...', 'auth-active');
            log('Google OAuth initiated via LOGIN command', 'info');
            addOutput('Initiating Google authentication...');

            try {
                const provider = new firebase.auth.GoogleAuthProvider();
                const result = await auth.signInWithPopup(provider);
                log('Google auth successful', 'success');
                addOutput('Google authentication successful.');

                updateStatus('VERIFYING TOKEN...', 'auth-active');
                const idToken = await result.user.getIdToken();
                const res = await fetch("/api/auth/signin", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ idToken })
                });

                if (res.ok) {
                    log('Backend access granted', 'success');
                    addOutput('Server authentication successful.');
                    updateStatus('ACCESS GRANTED', 'auth-active');
                    addOutput('Redirecting to dashboard...');
                    setTimeout(() => location.href = "/dashboard", 1500);
                } else {
                    throw new Error("Server authentication failed");
                }
            } catch (err) {
                log(`Authentication failed: ${err.message}`, 'error');
                addOutput(`<span style="color:#ff5555;">ERROR: ${err.message}</span>`);
                updateStatus('AUTHENTICATION FAILED', 'waiting');
            }
        },
        status: () => {
            const vnNow = getVietnamTime();
            const uptime = Math.floor((Date.now() - window.startTime) / 1000);
            const hours = String(Math.floor(uptime / 3600)).padStart(2, '0');
            const minutes = String(Math.floor((uptime % 3600) / 60)).padStart(2, '0');
            const seconds = String(uptime % 60).padStart(2, '0');
            addOutput(`SYSTEM STATUS:
  CPU: 12%  |  RAM: 640K/640K  |  UPTIME: ${hours}:${minutes}:${seconds}
  AUTH: ${statusMsg.textContent}  |  TIME: ${formatVNTime(vnNow)} (GMT+7)`);
            log('STATUS command executed', 'info');
        },
        clear: () => {
            output.innerHTML = '';
            log('TERMINAL cleared', 'info');
        },
        whoami: () => {
            addOutput('guest@labrynth: unauthorized');
            log('WHOAMI: guest', 'info');
        },
        time: () => {
            const vnNow = getVietnamTime();
            addOutput(`Current time (Vietnam): ${formatVNTime(vnNow)}`);
            log(`TIME command: ${formatVNTime(vnNow)}`, 'info');
        },
        reset: () => {
            updateStatus('WAITING FOR LOGIN COMMAND', 'waiting');
            addOutput('Authentication reset.');
            log('AUTHENTICATION reset', 'warn');
        }
    };

    // Khởi tạo thời gian khởi động
    window.startTime = Date.now();

    // Xử lý lệnh
    input.addEventListener('keydown', async e => {
        if (e.key === 'Enter') {
            const fullCmd = input.value.trim();
            const [cmd, ...args] = fullCmd.toLowerCase().split(' ');
            addOutput(`> ${fullCmd}`);
            input.value = '';

            if (cmd === 'echo' && args.length > 0) {
                addOutput(args.join(' '));
                log(`ECHO: ${args.join(' ')}`, 'info');
            } else if (commands[cmd]) {
                await commands[cmd](args);
            } else if (fullCmd) {
                addOutput(`Command not found: ${fullCmd}`);
                log(`Invalid command: ${fullCmd}`, 'error');
            }
        }
    });
    /*]]>*/
</script>
</body>
</html>
