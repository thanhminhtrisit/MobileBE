<!-- src/main/resources/templates/profile.html -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>USER PROFILE</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a1a2a;
      color: #a0e0f0;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 14px;
      line-height: 1.6;
      min-height: 100vh;
      padding: 15px;
      position: relative;
      overflow: hidden;
    }
    body::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: repeating-linear-gradient(0deg, rgba(0, 201, 167, 0.03), rgba(0, 201, 167, 0.03) 1px, transparent 1px, transparent 2px);
      pointer-events: none;
      z-index: 1;
      animation: scan 10s linear infinite;
    }
    @keyframes scan { 0% { transform: translateY(-100%); } 100% { transform: translateY(100%); } }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      background: #0f1f35;
      border: 3px solid #00c9a7;
      border-top-color: #00ffff;
      border-left-color: #00ffff;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 0 25px rgba(0, 201, 167, 0.4), inset 0 0 20px rgba(0, 255, 255, 0.1);
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      height: calc(100vh - 30px);
    }

    .header {
      background: linear-gradient(135deg, #00c9a7, #00ffff);
      color: #0a1a2a;
      padding: 12px 20px;
      text-align: center;
      font-family: 'Orbitron', sans-serif;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 5px;
      text-transform: uppercase;
      text-shadow: 0 0 10px rgba(255,255,255,0.5);
      border-bottom: 2px solid #00ffff;
    }

    .content {
      flex: 1;
      padding: 20px;
      display: grid;
      grid-template-columns: 1fr 1.6fr;
      gap: 20px;
      overflow: hidden;
    }

    .user-card {
      background: rgba(10, 22, 37, 0.9);
      border: 2px solid #00c9a7;
      border-radius: 6px;
      padding: 18px;
      box-shadow: inset 0 0 15px rgba(0, 201, 167, 0.2);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .user-header {
      text-align: center;
      margin-bottom: 15px;
    }
    .user-avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      border: 4px solid #00ffff;
      box-shadow: 0 0 20px rgba(0, 255, 255, 0.7);
      margin: 0 auto 15px;
      display: block;
      object-fit: cover;
    }
    .user-name {
      color: #00ffff;
      font-size: 20px;
      font-weight: 600;
      text-shadow: 0 0 10px #00ffff;
    }
    .user-email {
      color: #00c9a7;
      font-size: 14px;
      margin-top: 5px;
    }

    .info-grid {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      overflow-y: auto;
      padding-right: 5px;
      font-size: 13px;
    }
    .info-item {
      background: rgba(0, 201, 167, 0.1);
      padding: 10px;
      border-left: 3px solid #00ffff;
      border-radius: 0 4px 4px 0;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .info-label {
      color: #00c9a7;
      font-weight: 600;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .info-value {
      color: #ffffff;
      word-break: break-all;
      font-size: 12px;
      line-height: 1.4;
    }
    .copy-btn {
      align-self: flex-end;
      background: rgba(0, 201, 167, 0.2);
      border: 1px solid #00c9a7;
      color: #00ffff;
      font-size: 10px;
      padding: 3px 7px;
      border-radius: 3px;
      cursor: pointer;
      transition: all 0.3s;
    }
    .copy-btn:hover {
      background: #00c9a7;
      color: #0a1a2a;
    }

    .terminal {
      background: #0a1625;
      border: 2px solid #00c9a7;
      border-radius: 6px;
      padding: 15px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: inset 0 0 15px rgba(0, 201, 167, 0.2);
    }
    .terminal-header {
      color: #00c9a7;
      font-weight: 600;
      margin-bottom: 10px;
      letter-spacing: 2px;
      font-size: 13px;
      border-bottom: 1px dashed #00c9a7;
      padding-bottom: 6px;
      text-shadow: 0 0 6px #00c9a7;
    }
    .terminal-log {
      flex: 1;
      overflow-y: auto;
      font-size: 12px;
      line-height: 1.5;
      padding-right: 5px;
    }
    .terminal-line {
      margin: 5px 0;
      opacity: 0.9;
      white-space: pre-wrap;
      word-break: break-all;
      position: relative;
      padding-left: 18px;
    }
    .terminal-line::before {
      content: "> ";
      color: #00ffff;
      position: absolute;
      left: 0;
      top: 0;
    }

    .token-line {
      color: #00ffcc;
      font-family: 'Courier New', monospace;
      font-size: 11px;
      line-height: 1.3;
      margin: 6px 0;
    }
    #token-short { opacity: 0.9; }
    #token-full {
      display: none;
      background: rgba(0, 255, 204, 0.05);
      padding: 10px;
      border-radius: 4px;
      border: 1px dashed rgba(0, 255, 204, 0.3);
      margin: 8px 0;
      max-height: 140px;
      overflow-y: auto;
      font-size: 10px;
      line-height: 1.4;
      color: #00ffcc;
      position: relative;
      padding-left: 18px;
    }
    #token-full::before {
      content: "> ";
      color: #00ffff;
      position: absolute;
      left: 10px;
      top: 10px;
    }
    #token-full::-webkit-scrollbar { width: 6px; }
    #token-full::-webkit-scrollbar-thumb { background: #00c9a7; border-radius: 3px; }

    .token-controls {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 8px;
      padding-left: 18px;
    }
    .token-controls button { font-size: 10px; padding: 3px 8px; }

    .status-bar {
      background: rgba(0, 201, 167, 0.1);
      color: #00ffff;
      padding: 6px 15px;
      font-size: 11px;
      text-align: center;
      border-top: 1px solid #00c9a7;
    }

    .info-grid::-webkit-scrollbar,
    .terminal-log::-webkit-scrollbar {
      width: 8px;
    }
    .info-grid::-webkit-scrollbar-track,
    .terminal-log::-webkit-scrollbar-track {
      background: #0a1625;
      border-radius: 4px;
    }
    .info-grid::-webkit-scrollbar-thumb,
    .terminal-log::-webkit-scrollbar-thumb {
      background: #00c9a7;
      border-radius: 4px;
    }

    @media (max-width: 900px) {
      .content { grid-template-columns: 1fr; }
      .info-grid { grid-template-columns: 1fr; }
      .token-controls { justify-content: center; padding-left: 0; }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="header">USER PROFILE</div>

  <div class="content">
    <!-- USER INFO -->
    <div class="user-card">
      <div class="user-header">
        <img th:src="${user.photoURL} ?: 'https://via.placeholder.com/100?text=USER'"
             alt="Avatar" class="user-avatar">
        <div class="user-name" th:text="${user.displayName} ?: 'Unknown User'">Loading...</div>
        <div class="user-email" th:text="${user.email}">email@domain.com</div>
      </div>

      <div class="info-grid">
        <div class="info-item">
          <div class="info-label">User ID</div>
          <div class="info-value" th:text="${user.userId}">1</div>
          <button class="copy-btn" th:attr="data-value=${user.userId}">COPY</button>
        </div>

        <div class="info-item">
          <div class="info-label">Username</div>
          <div class="info-value" th:text="${user.username}">user</div>
          <button class="copy-btn" th:attr="data-value=${user.username}">COPY</button>
        </div>

        <div class="info-item">
          <div class="info-label">Email</div>
          <div class="info-value" th:text="${user.email}">email@domain.com</div>
          <button class="copy-btn" th:attr="data-value=${user.email}">COPY</button>
        </div>

        <div class="info-item">
          <div class="info-label">Phone</div>
          <div class="info-value" th:text="${user.phone} ?: 'Not set'">Not set</div>
          <button class="copy-btn" th:attr="data-value=${user.phone} ?: ''">COPY</button>
        </div>

        <div class="info-item">
          <div class="info-label">Firebase UID</div>
          <div class="info-value" th:text="${#strings.abbreviate(user.uid, 20)}">...</div>
          <button class="copy-btn" th:attr="data-value=${user.uid}">COPY</button>
        </div>

        <div class="info-item">
          <div class="info-label">Provider</div>
          <div class="info-value" th:text="${user.providerId}">Google</div>
          <button class="copy-btn" th:attr="data-value='Google'">COPY</button>
        </div>

        <div class="info-item">
          <div class="info-label">Email Verified</div>
          <div class="info-value" th:text="${user.emailVerified} ? 'YES' : 'NO'">YES</div>
          <button class="copy-btn" th:attr="data-value=${user.emailVerified} ? 'YES' : 'NO'">COPY</button>
        </div>

        <div class="info-item">
          <div class="info-label">Created At</div>
          <div class="info-value" th:text="${#temporals.format(user.createdAt, 'yyyy-MM-dd HH:mm:ss')}">2025-01-01 12:00:00</div>
          <button class="copy-btn" th:attr="data-value=${#temporals.format(user.createdAt, 'yyyy-MM-dd HH:mm:ss')}">COPY</button>
        </div>

        <div class="info-item">
          <div class="info-label">Updated At</div>
          <div class="info-value" th:text="${#temporals.format(user.updatedAt, 'yyyy-MM-dd HH:mm:ss')}">2025-01-01 12:00:00</div>
          <button class="copy-btn" th:attr="data-value=${#temporals.format(user.updatedAt, 'yyyy-MM-dd HH:mm:ss')}">COPY</button>
        </div>
      </div>

      <!-- KHÔNG CÓ NÚT VIEW PROFILE HOẶC LOGOUT -->
    </div>

    <!-- TOKEN + TERMINAL -->
    <div class="terminal">
      <div class="terminal-header">ID TOKEN</div>
      <div class="terminal-log">
        <div class="terminal-line" th:if="${idToken != null}">TOKEN:</div>

        <div class="terminal-line token-line" id="token-short"
             th:text="${#strings.substring(idToken, 0, 60)} + ' ... ' + ${#strings.substring(idToken, #strings.length(idToken) - 60, #strings.length(idToken))}">
          eyJhbGciOiJSUzI1NiIsImtpZCI6...
        </div>

        <div class="terminal-line" id="token-full" style="display:none;" th:text="${idToken}"></div>

        <div class="token-controls">
          <button class="copy-btn" id="show-token-btn">SHOW FULL</button>
          <button class="copy-btn" id="copy-token-btn">COPY TOKEN</button>
        </div>
      </div>
    </div>
  </div>

  <div class="status-bar">
    PROFILE VIEW • SECURE • <span id="clock"></span>
  </div>
</div>

<script th:inline="javascript">
  /*<![CDATA[*/
  document.addEventListener('DOMContentLoaded', () => {
    function updateClock() {
      const now = new Date();
      document.getElementById('clock').textContent = now.toLocaleTimeString('vi-VN');
    }
    setInterval(updateClock, 1000);
    updateClock();

    const tokenShort = document.getElementById('token-short');
    const tokenFull = document.getElementById('token-full');
    const showBtn = document.getElementById('show-token-btn');
    const copyBtn = document.getElementById('copy-token-btn');
    const fullToken = /*[[${idToken}]]*/ '';

    if (showBtn && tokenFull && tokenShort) {
      showBtn.addEventListener('click', () => {
        if (!tokenFull.style.display || tokenFull.style.display === 'none') {
          tokenFull.style.display = 'block';
          tokenShort.style.display = 'none';
          showBtn.textContent = 'HIDE';
        } else {
          tokenFull.style.display = 'none';
          tokenShort.style.display = 'block';
          showBtn.textContent = 'SHOW FULL';
        }
      });
    }

    if (copyBtn) {
      copyBtn.addEventListener('click', () => {
        navigator.clipboard.writeText(fullToken).then(() => {
          const orig = copyBtn.textContent;
          copyBtn.textContent = 'COPIED!';
          setTimeout(() => copyBtn.textContent = orig, 1500);
        }).catch(() => alert('Copy failed!'));
      });
    }

    document.querySelectorAll('.copy-btn').forEach(btn => {
      if (btn.hasAttribute('data-value')) {
        btn.addEventListener('click', () => {
          const text = btn.getAttribute('data-value');
          if (!text) return;
          navigator.clipboard.writeText(text).then(() => {
            const orig = btn.textContent;
            btn.textContent = 'COPIED!';
            setTimeout(() => btn.textContent = orig, 1500);
          }).catch(() => alert('Copy failed!'));
        });
      }
    });
  });
  /*]]>*/
</script>
</body>
</html>
